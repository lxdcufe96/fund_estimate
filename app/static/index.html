<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="theme-color" content="#10221a">
  <title>净值望远镜 · 基金盘中估值</title>
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
  <div class="grain" aria-hidden="true"></div>
  <main class="shell">
    <header class="masthead">
      <div>
        <p class="eyebrow">FUND LENS · 个人估值台</p>
        <h1>净值<br><span>望远镜</span></h1>
      </div>
      <div class="market-seal" aria-label="市场状态">
        <span class="pulse"></span>
        <b id="global-status">数据待同步</b>
        <small>持仓穿透估算</small>
      </div>
    </header>

    <section class="control-panel" aria-label="添加基金">
      <label for="fund-input">基金代码</label>
      <div class="input-row">
        <input id="fund-input" inputmode="numeric" maxlength="6" placeholder="例如 090007" autocomplete="off">
        <button id="add-button" type="button">加入观察</button>
      </div>
      <p id="form-message" class="form-message" aria-live="polite">输入 6 位代码，可保存到当前浏览器。</p>
    </section>

    <section class="summary" aria-label="组合概览">
      <div><span>自选基金</span><strong id="fund-count">0</strong></div>
      <div><span>上涨 / 下跌</span><strong id="direction-count">—</strong></div>
      <button id="refresh-button" type="button" class="text-button">刷新全部 ↻</button>
    </section>

    <section id="fund-list" class="fund-list" aria-live="polite"></section>

    <footer><p id="last-refresh">尚未刷新</p></footer>
  </main>

  <template id="fund-card-template">
    <article class="fund-card loading">
      <div class="card-stripe"></div>
      <header class="card-head">
        <div>
          <p class="fund-code"></p>
          <h2 class="fund-name">正在读取基金资料…</h2>
        </div>
        <button class="remove-button" type="button" aria-label="删除基金">×</button>
      </header>
      <div class="value-grid">
        <div class="estimate-block">
          <span>盘中估算净值</span>
          <strong class="estimated-nav">—</strong>
          <em class="estimated-change">同步中</em>
        </div>
        <div class="official-block">
          <span>最新官方净值</span>
          <strong class="official-nav">—</strong>
          <small class="official-date">—</small>
        </div>
      </div>
      <div class="detail-body">
        <div class="facts"></div>
        <div class="holdings"></div>
      </div>
      <p class="card-error" role="alert"></p>
    </article>
  </template>

  <script src="/static/app.js" defer></script>
</body>
</html>
