<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="theme-color" content="#f3f3f8">
  <title>基金盘中估值</title>
  <link rel="stylesheet" href="/static/styles.css?v=20260723-1">
</head>
<body>
  <main class="shell">
    <section class="control-panel" aria-label="添加基金">
      <div class="input-row">
        <input id="fund-input" inputmode="numeric" maxlength="6" placeholder="输入6位基金代码" autocomplete="off" aria-label="基金代码">
        <button id="add-button" type="button">添加</button>
      </div>
      <p id="form-message" class="form-message" aria-live="polite"></p>
    </section>

    <div class="list-toolbar">
      <span id="last-refresh">尚未刷新</span>
      <button id="refresh-button" type="button">刷新</button>
    </div>

    <section id="fund-list" class="fund-list" aria-live="polite"></section>
  </main>

  <template id="fund-card-template">
    <article class="fund-card loading">
      <button class="card-summary" type="button" aria-expanded="false">
        <span class="fund-identity">
          <strong class="fund-name">正在读取基金资料…</strong>
          <span class="fund-code"></span>
        </span>
        <span class="fund-quote">
          <strong class="estimated-change">同步中</strong>
          <span class="estimate-line">预估净值 <b class="estimated-nav">—</b></span>
        </span>
        <span class="chevron" aria-hidden="true">⌄</span>
      </button>

      <div class="card-detail">
        <div class="official-strip">
          <div><span>前一日净值</span><strong class="official-nav">—</strong></div>
          <div><span>前一日涨跌</span><strong class="official-change">—</strong></div>
          <div><span>净值日期</span><strong class="official-date">—</strong></div>
        </div>
        <div class="facts"></div>
        <div class="holdings"></div>
      </div>

      <button class="remove-button" type="button" aria-label="删除基金">×</button>
      <p class="card-error" role="alert"></p>
    </article>
  </template>

  <script src="/static/app.js?v=20260723-1" defer></script>
</body>
</html>
